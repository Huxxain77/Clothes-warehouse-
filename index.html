<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>خياط الشباب الذهبي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0f14;--surf:#161b25;--surf2:#1e2535;--brd:#2a3347;--gold:#c8a96e;--gold2:#e8c98e;--txt:#e8eaf0;--mut:#7a8399;--grn:#4ade80;--red:#f87171;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;direction:rtl}
.hdr{background:linear-gradient(135deg,var(--surf),#1a2030);border-bottom:1px solid var(--brd);padding:0 1.5rem;height:62px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:90;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.bc{display:none;align-items:center;gap:6px;font-size:.83rem;color:var(--mut)}
.bc .hl{color:var(--gold);font-weight:700}
.bc .arr{opacity:.4}
.bc .back{cursor:pointer;transition:color .2s}
.bc .back:hover{color:var(--gold)}
.cloud-badge{font-size:.72rem;padding:3px 8px;border-radius:8px;font-weight:600;background:rgba(74,222,128,.12);color:var(--grn);border:1px solid rgba(74,222,128,.25);transition:all .3s}
.cloud-badge.warn{background:rgba(248,113,113,.12);color:var(--red);border-color:rgba(248,113,113,.25)}
.cloud-badge.sync{background:rgba(200,169,110,.12);color:var(--gold);border-color:rgba(200,169,110,.25)}
.pg{display:none}.pg.on{display:block;animation:fade .22s ease}
@keyframes fade{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.home-wrap{max-width:900px;margin:0 auto;padding:2rem 1.5rem}
.home-hero{text-align:center;padding:1.5rem 0 2rem}
.home-sub{color:var(--mut);font-size:.85rem;margin-top:.3rem}
.home-actions{display:flex;gap:.75rem;margin-bottom:1.6rem;justify-content:center;flex-wrap:wrap}
.add-yr-bar{display:none;align-items:center;gap:.7rem;flex-wrap:wrap;background:var(--surf);border:1px dashed var(--brd);border-radius:13px;padding:.9rem 1.3rem;margin-bottom:1.4rem}
.add-yr-bar.on{display:flex}
.add-yr-bar span{color:var(--mut);font-size:.85rem;flex:1}
.add-yr-bar input{background:var(--surf2);border:1px solid var(--brd);border-radius:9px;padding:.52rem .9rem;color:var(--txt);font-family:'Cairo',sans-serif;font-size:.9rem;outline:none;width:130px;text-align:center;transition:border-color .2s}
.add-yr-bar input:focus{border-color:var(--gold)}
.srch-bar{display:none;align-items:center;gap:.7rem;flex-wrap:wrap;background:var(--surf);border:1px solid var(--brd);border-radius:13px;padding:.9rem 1.3rem;margin-bottom:1.4rem}
.srch-bar.on{display:flex}
.srch-box-wrap{position:relative;flex:1;min-width:200px}
.srch-inner{display:flex;align-items:center;gap:.45rem;background:var(--surf2);border:1px solid var(--brd);border-radius:9px;padding:.52rem .9rem;transition:border-color .2s}
.srch-inner:focus-within{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,169,110,.1)}
.srch-inner input{background:none;border:none;outline:none;color:var(--txt);font-family:'Cairo',sans-serif;font-size:16px;width:100%;direction:rtl}
.srch-inner input::placeholder{color:var(--mut)}
.ac-drop{position:absolute;top:calc(100% + 5px);right:0;left:0;background:var(--surf);border:1px solid var(--brd);border-radius:11px;box-shadow:0 10px 35px rgba(0,0,0,.4);z-index:80;overflow-y:auto;max-height:280px;display:none}
.ac-drop.on{display:block}
.ac-item{padding:.65rem 1rem;font-size:.87rem;cursor:pointer;display:flex;flex-direction:column;gap:.3rem;border-bottom:1px solid rgba(42,51,71,.4);transition:background .15s}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item.hi{background:var(--surf2)}
.ac-item mark{background:rgba(200,169,110,.27);color:var(--gold);padding:0 2px;border-radius:3px}
.ac-item-name{font-size:.9rem;font-weight:700;color:var(--txt)}
.ac-item-meta{display:flex;gap:.4rem;flex-wrap:wrap}
.ac-badge{font-size:.72rem;padding:3px 8px;border-radius:8px;font-weight:700;flex-shrink:0}
.b-yr{background:rgba(200,169,110,.15);color:var(--gold);border:1px solid rgba(200,169,110,.25)}
.b-row{background:rgba(255,255,255,.06);color:var(--mut)}
select.yr-sel{background:var(--surf2);border:1px solid var(--brd);border-radius:9px;padding:.52rem .9rem;color:var(--txt);font-family:'Cairo',sans-serif;font-size:.85rem;outline:none;cursor:pointer}
.yr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1.1rem}
.yr-card{background:var(--surf);border:1px solid var(--brd);border-radius:16px;padding:1.5rem 1.5rem 2.2rem;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;min-height:150px}
.yr-card:hover{transform:translateY(-3px);border-color:var(--gold);box-shadow:0 12px 36px rgba(0,0,0,.32)}
.yc-yr{font-family:'Tajawal',sans-serif;font-size:1.8rem;font-weight:900;color:var(--gold);line-height:1;margin-bottom:.5rem}
.yc-tot{font-size:.82rem;color:var(--mut);margin-bottom:.85rem}
.yc-tot strong{color:var(--txt);font-size:.92rem}
.yc-tags{display:flex;gap:.45rem;flex-wrap:wrap}
.yc-tag{font-size:.76rem;padding:4px 10px;border-radius:8px;font-weight:700;white-space:nowrap;color:#fff}
.yc-arrow{position:absolute;bottom:.9rem;left:.9rem;color:var(--mut);transition:all .2s}
.yr-card:hover .yc-arrow{color:var(--gold);transform:translateX(-4px)}
.yc-del{position:absolute;top:.75rem;left:.75rem;background:none;border:none;color:var(--mut);cursor:pointer;padding:3px 5px;border-radius:6px;font-size:.83rem;transition:all .2s;opacity:0}
.yr-card:hover .yc-del{opacity:1}
.yc-del:hover{background:rgba(248,113,113,.18);color:var(--red)}
.empty-home{text-align:center;padding:3rem 1rem;color:var(--mut)}
.empty-home .big{font-size:3rem;opacity:.2;margin-bottom:.5rem}
.yr-wrap{max-width:1280px;margin:0 auto;padding:1.4rem 1.5rem 3rem}
.yr-bar{display:flex;align-items:center;gap:.7rem;margin-bottom:1.3rem;flex-wrap:wrap}
.yr-sbox{position:relative;flex:1;min-width:200px}
.yr-sinner{display:flex;align-items:center;gap:.45rem;background:var(--surf);border:1px solid var(--brd);border-radius:11px;padding:.53rem 1rem;transition:border-color .2s}
.yr-sinner:focus-within{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,169,110,.1)}
.yr-sinner input{background:none;border:none;outline:none;color:var(--txt);font-family:'Cairo',sans-serif;font-size:16px;width:100%;direction:rtl}
.yr-sinner input::placeholder{color:var(--mut)}
.yr-ac{position:absolute;top:calc(100% + 5px);right:0;left:0;background:var(--surf);border:1px solid var(--brd);border-radius:11px;box-shadow:0 10px 35px rgba(0,0,0,.4);z-index:80;overflow-y:auto;max-height:280px;display:none}
.yr-ac.on{display:block}
.stats-row{display:flex;gap:.85rem;margin-bottom:1.3rem;flex-wrap:wrap}
.sc{background:var(--surf);border:1px solid var(--brd);border-radius:13px;padding:.75rem 1.15rem;display:flex;align-items:center;gap:.6rem;flex:1;min-width:110px}
.sc-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.sc-lbl{font-size:.74rem;color:var(--mut)}
.sc-val{font-size:1.28rem;font-weight:900;font-family:'Tajawal',sans-serif;line-height:1}
.col-chip{display:inline-flex;align-items:center;gap:.3rem;padding:3px 8px;border-radius:20px;font-size:.75rem;font-weight:700;border:1px solid}
.tbl-card{background:var(--surf);border:1px solid var(--brd);border-radius:15px;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,.35)}
.tbl-card-header{display:flex;justify-content:space-between;align-items:center;padding:.5rem .8rem .2rem}
.btn-expand{background:var(--surf2);border:1px solid var(--brd);border-radius:8px;color:var(--mut);cursor:pointer;font-size:1.1rem;padding:4px 10px;transition:all .2s;line-height:1}
.btn-expand:hover{background:var(--brd);color:var(--txt)}
.tbl-card.fullscreen{position:fixed;inset:0;z-index:150;border-radius:0;margin:0;display:flex;flex-direction:column;background:var(--surf)}
.tbl-card.fullscreen .tbl-scroll{flex:1;overflow:auto}
.tbl-card.fullscreen .btn-expand{font-size:1.2rem;color:var(--gold)}
.tbl-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:400px;direction:rtl}
thead tr{background:var(--surf2)}
th{padding:.8rem .95rem;font-size:.79rem;font-weight:700;color:#fff;text-align:center;border-bottom:1px solid var(--brd);white-space:nowrap}
th.th-num{color:var(--mut);background:transparent}
tbody tr{border-bottom:1px solid rgba(42,51,71,.45);transition:background .14s}
tbody tr:hover{background:rgba(255,255,255,.02)}
tbody tr:last-child{border-bottom:none}
tbody tr.dim{opacity:.22}
td{padding:.6rem .95rem;text-align:center;font-size:.87rem;vertical-align:middle}
td.tn{color:var(--mut);font-size:.75rem;width:40px}
.ci{display:inline-flex;align-items:center;gap:.3rem;padding:3px 7px;border-radius:7px;cursor:pointer;transition:background .14s;min-width:72px;justify-content:center}
.ci:hover{background:var(--surf2)}
.edi{opacity:0;font-size:.66rem;color:var(--mut);transition:opacity .14s}
.ci:hover .edi{opacity:1}
.emp{color:var(--mut);opacity:.35;font-size:.77rem}
.ci-inp{background:var(--surf2);border:1.5px solid var(--gold);border-radius:7px;padding:3px 7px;color:var(--txt);font-family:'Cairo',sans-serif;font-size:.87rem;text-align:center;outline:none;width:100%;min-width:72px;direction:rtl;box-shadow:0 0 0 3px rgba(200,169,110,.11)}
.copy-btn{background:none;border:none;color:var(--mut);cursor:pointer;font-size:.8rem;padding:2px 5px;border-radius:5px;transition:all .18s;opacity:0;flex-shrink:0}
tr:hover .copy-btn{opacity:1}
.copy-btn:hover{background:rgba(200,169,110,.15);color:var(--gold)}
.del-r{background:none;border:none;color:var(--mut);cursor:pointer;font-size:.87rem;padding:3px 5px;border-radius:6px;transition:all .2s;opacity:0}
tr:hover .del-r{opacity:1}
.del-r:hover{background:rgba(248,113,113,.16);color:var(--red)}
.tbl-empty{padding:2.8rem;text-align:center;color:var(--mut)}
.tbl-empty .ico{font-size:2rem;opacity:.2;margin-bottom:.4rem}
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.57rem 1.1rem;border-radius:11px;border:none;font-family:'Cairo',sans-serif;font-size:.86rem;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-g{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1a1205}
.btn-g:hover{transform:translateY(-1px);box-shadow:0 5px 18px rgba(200,169,110,.28)}
.btn-s{background:var(--surf2);color:var(--txt);border:1px solid var(--brd)}
.btn-s:hover{background:var(--brd)}
.btn-sm{padding:.32rem .7rem;font-size:.79rem;border-radius:8px}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);animation:fov .18s ease}
@keyframes fov{from{opacity:0}to{opacity:1}}
.modal{background:var(--surf);border:1px solid var(--brd);border-radius:19px;padding:1.8rem;width:90%;max-width:440px;box-shadow:0 18px 55px rgba(0,0,0,.5);animation:mup .2s ease;direction:rtl;max-height:90vh;overflow-y:auto}
@keyframes mup{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal h2{font-family:'Tajawal',sans-serif;font-size:1.12rem;font-weight:700;margin-bottom:1.2rem;color:var(--gold);display:flex;align-items:center;gap:.4rem}
.fg{margin-bottom:1rem}
.fg label{display:block;font-size:.79rem;font-weight:600;color:var(--mut);margin-bottom:.3rem}
.fc{width:100%;background:var(--surf2);border:1px solid var(--brd);border-radius:9px;padding:.6rem .95rem;color:var(--txt);font-family:'Cairo',sans-serif;font-size:16px;outline:none;transition:border-color .2s;direction:rtl}
.fc:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,169,110,.1)}
.col-picker{display:flex;gap:.42rem;flex-wrap:wrap}
.co{display:flex;align-items:center;gap:.38rem;padding:.55rem .85rem;border:2px solid var(--brd);border-radius:9px;cursor:pointer;transition:all .17s;font-size:.79rem;font-weight:600;color:var(--txt)}
.co:hover{opacity:.85}
.co.sel{opacity:1}
.added-log{display:none;align-items:center;gap:.4rem;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.23);color:var(--grn);border-radius:8px;padding:5px 10px;font-size:.81rem;font-weight:700;margin-top:.75rem}
.added-log.on{display:flex}
.mfoot{display:flex;gap:.55rem;justify-content:flex-end;margin-top:1.2rem}
.col-list-item{display:flex;align-items:center;gap:.5rem;padding:.5rem .7rem;background:var(--surf2);border-radius:9px;margin-bottom:.4rem}
.col-list-item input{flex:1;background:none;border:none;outline:none;color:var(--txt);font-family:'Cairo',sans-serif;font-size:.88rem;direction:rtl}
.col-list-item .del-col-btn{background:none;border:none;color:var(--mut);cursor:pointer;font-size:.9rem;padding:2px 4px;border-radius:5px;transition:all .18s;flex-shrink:0}
.col-list-item .del-col-btn:hover{color:var(--red);background:rgba(248,113,113,.15)}
.toast{position:fixed;bottom:1.7rem;left:50%;transform:translateX(-50%) translateY(65px);background:var(--surf2);border:1px solid var(--brd);border-radius:11px;padding:.65rem 1.35rem;font-size:.86rem;font-weight:600;z-index:300;transition:transform .27s ease, opacity .27s ease;box-shadow:0 8px 28px rgba(0,0,0,.4);pointer-events:none;opacity:0}
.toast.on{transform:translateX(-50%) translateY(0);opacity:1}
.toast.ok{border-color:rgba(74,222,128,.38);color:var(--grn)}
.toast.er{border-color:rgba(248,113,113,.38);color:var(--red)}
@media(max-width:600px){.home-wrap,.yr-wrap{padding:1rem}.yr-bar{flex-direction:column;align-items:stretch}}
</style>
</head>
<body>
<header class="hdr">
  <button class="btn btn-s" onclick="goHome()" style="font-size:.85rem;padding:.4rem .9rem;">🏠 الرئيسية</button>

    <span class="back" onclick="goHome()">الرئيسية</span>
    <span class="arr">›</span>

  <div style="display:flex;align-items:center;gap:.6rem">
    <span class="cloud-badge" id="cloudBadge">☁️ جاهز</span>
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>
<script>

var FB_PROJECT="shabab-taylor";
var FB_API_KEY="AIzaSyAVJgTrWsvfUMBl0a46-j2DjhvmGbG5Nms";
var FB_URL="https://firestore.googleapis.com/v1/projects/"+FB_PROJECT+"/databases/(default)/documents/warehouse/main";
var db={},CY=null,selC=null,editInfo=null,addedCount=0,gAcIdx=-1,yrAcIdx=-1,saveTimer=null;
var DEFAULT_COLS=[{id:"wall",name:"ما صورة الجدار"},{id:"c1",name:"ما صورة (1)"},{id:"c2",name:"ما صورة (2)"},{id:"c3",name:"ما صورة (3)"}];
var COL_COLORS=["#c87c3b","#6b4a9e","#3b7a5a","#9e4a6b","#3b5e9e","#7a7a3b","#9e6b3b","#3b9e8a"];

function toFS(o){return{fields:{data:{stringValue:JSON.stringify(o)}}};}
function fromFS(d){try{return JSON.parse(d.fields.data.stringValue);}catch(e){return{};}}
function cloudBadge(msg,type){var el=document.getElementById("cloudBadge");el.textContent=msg;el.className="cloud-badge "+(type||"");}

function loadDB(){
  cloudBadge("⏳ تحميل...","sync");
  fetch(FB_URL+"?key="+FB_API_KEY)
    .then(function(r){return r.json();})
    .then(function(doc){
      if(doc&&doc.fields){db=fromFS(doc);localStorage.setItem("wh3",JSON.stringify(db));cloudBadge("☁️ متزامن","");}
      else{loadLocal();if(Object.keys(db).length>0)pushCloud();}
      renderHome();
    })
    .catch(function(){loadLocal();cloudBadge("📵 محلي","warn");renderHome();});
}
function loadLocal(){try{db=JSON.parse(localStorage.getItem("wh3")||"{}");}catch(e){db={};}}
function saveDB(){
  localStorage.setItem("wh3",JSON.stringify(db));
  clearTimeout(saveTimer);cloudBadge("⏳ حفظ...","sync");
  saveTimer=setTimeout(pushCloud,1500);
}
function pushCloud(){
  fetch(FB_URL+"?key="+FB_API_KEY,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify(toFS(db))})
    .then(function(r){if(r.ok)cloudBadge("☁️ محفوظ","");else cloudBadge("⚠️ خطأ","warn");})
    .catch(function(){cloudBadge("📵 محلي فقط","warn");});
}

function getYD(yr){
  if(!db[yr])db[yr]={cols:JSON.parse(JSON.stringify(DEFAULT_COLS)),rows:{}};
  if(!db[yr].cols)db[yr].cols=JSON.parse(JSON.stringify(DEFAULT_COLS));
  if(!db[yr].rows)db[yr].rows={};
  return db[yr];
}
function getCols(yr){return getYD(yr).cols;}
function getMax(yr){var d=getYD(yr),m=0;d.cols.forEach(function(c){m=Math.max(m,(d.rows[c.id]||[]).length);});return m;}
function getTot(yr){var d=getYD(yr),t=0;d.cols.forEach(function(c){t+=(d.rows[c.id]||[]).length;});return t;}
function getAllNames(yr){
  var d=getYD(yr),res=[];
  d.cols.forEach(function(c){(d.rows[c.id]||[]).forEach(function(n,i){if(n)res.push({name:n,col:c.id,colName:c.name,idx:i,yr:yr});});});
  return res;
}
function colColor(yr,colId){var cols=getCols(yr),idx=cols.findIndex(function(c){return c.id===colId;});return COL_COLORS[idx%COL_COLORS.length]||"#888";}

function goHome(){CY=null;document.getElementById("pgHome").classList.add("on");document.getElementById("pgYear").classList.remove("on");document.getElementById("bc").style.display="none";renderHome();}
function goYear(yr){CY=yr;document.getElementById("pgHome").classList.remove("on");document.getElementById("pgYear").classList.add("on");document.getElementById("bc").style.display="flex";document.getElementById("bcYr").textContent=yr;document.getElementById("yrSrch").value="";document.getElementById("yrAcDrop").classList.remove("on");renderYearPage();}

function renderHome(){
  var grid=document.getElementById("yrGrid"),years=Object.keys(db).sort(function(a,b){return b-a;});
  grid.innerHTML="";
  if(years.length===0){
    grid.innerHTML='<div class="empty-home"><div class="big">🗂️</div><p>لا توجد سنوات بعد — أضف سنة للبدء</p></div>';
  } else {
    years.forEach(function(yr){
      var t=getTot(yr),cols=getCols(yr);
      var tagsHtml=cols.map(function(c,i){
        var cnt=(getYD(yr).rows[c.id]||[]).length;
        var bg=COL_COLORS[i%COL_COLORS.length];
        return '<span class="yc-tag" style="background:'+bg+'aa">'+c.name+' '+cnt+'</span>';
      }).join("");
      var card=document.createElement("div");
      card.className="yr-card";
      card.innerHTML=
        '<button class="yc-del" onclick="event.stopPropagation();delYr(\''+yr+'\')">🗑</button>'+
        '<div class="yc-yr">'+yr+'</div>'+
        '<div class="yc-tot">إجمالي: <strong>'+t+'</strong> زبون</div>'+
        '<div class="yc-tags">'+tagsHtml+'</div>'+
        '<div class="yc-arrow">←</div>';
      card.addEventListener("click",function(){goYear(yr);});
      grid.appendChild(card);
    });
  }
  var sel=document.getElementById("srchYrSel"),cur=sel.value;
  sel.innerHTML='<option value="">كل السنوات</option>';
  years.forEach(function(yr){var o=document.createElement("option");o.value=yr;o.textContent=yr;if(yr===cur)o.selected=true;sel.appendChild(o);});
}

function toggleAddYr(){var bar=document.getElementById("addYrBar");var open=bar.classList.toggle("on");if(open){document.getElementById("yrInp").value="";document.getElementById("yrInp").focus();}}
function addYr(){var v=document.getElementById("yrInp").value.trim();if(!v||v<1900||v>2100){toast("أدخل سنة صحيحة","er");return;}if(db[v]){toast("السنة موجودة مسبقاً","er");return;}getYD(v);saveDB();document.getElementById("addYrBar").classList.remove("on");renderHome();toast("تمت إضافة سنة "+v+" ✓","ok");}
function delYr(yr){if(!confirm("حذف سنة "+yr+" وجميع بياناتها؟"))return;delete db[yr];saveDB();renderHome();toast("تم حذف سنة "+yr,"er");}
function toggleSrch(){var bar=document.getElementById("srchBar");var open=bar.classList.toggle("on");if(open)document.getElementById("gSrch").focus();}

function clearGSrch(){
  document.getElementById("gSrch").value="";
  document.getElementById("gSrchClear").style.display="none";
  document.getElementById("gAcDrop").classList.remove("on");
  document.getElementById("srchCount").innerHTML="";
}
function clearYrSrch(){
  document.getElementById("yrSrch").value="";
  document.getElementById("yrSrchClear").style.display="none";
  document.getElementById("yrAcDrop").classList.remove("on");
  document.getElementById("yrSrchCount").innerHTML="";
  renderTable("");
}

function gSearch(){
  var q=document.getElementById("gSrch").value.trim();
  var fy=document.getElementById("srchYrSel").value;
  var drop=document.getElementById("gAcDrop");
  gAcIdx=-1;
  if(!q){drop.classList.remove("on");document.getElementById("srchCount").innerHTML="";document.getElementById("gSrchClear").style.display="none";return;}
  document.getElementById("gSrchClear").style.display="inline";
  var years=fy?[fy]:Object.keys(db),matches=[];
  years.forEach(function(yr){getAllNames(yr).forEach(function(m){if(smartMatch(m.name,q))matches.push(m);});});
  document.getElementById("srchCount").innerHTML=matches.length
    ? '<span style="background:rgba(200,169,110,.15);color:var(--gold);border:1px solid rgba(200,169,110,.3);padding:3px 10px;border-radius:20px;font-weight:700;font-size:.82rem">👥 '+matches.length+' زبون</span>'
    : '<span style="color:var(--red);font-size:.82rem">لا نتائج</span>';
  if(!matches.length){drop.classList.remove("on");drop.innerHTML="";return;}
  drop.innerHTML=matches.slice(0,50).map(function(m){
    var bg=colColor(m.yr,m.col);
    return '<div class="ac-item" onmousedown="gAcPick(\''+esc(m.name)+'\',\''+m.yr+'\')">'+
      '<div class="ac-item-name">'+highlightWords(m.name,q)+'</div>'+
      '<div class="ac-item-meta">'+
        '<span class="ac-badge" style="background:'+bg+'33;color:'+bg+';border-color:'+bg+'66">'+m.colName+'</span>'+
        '<span class="ac-badge b-yr">سنة '+m.yr+'</span>'+
        '<span class="ac-badge b-row">صف '+(m.idx+1)+'</span>'+
      '</div></div>';
  }).join("");
  drop.classList.add("on");
}
function gAcPick(name,yr){document.getElementById("gSrch").value=name;document.getElementById("gAcDrop").classList.remove("on");goYear(yr);setTimeout(function(){document.getElementById("yrSrch").value=name;yrSearch();},60);}
function gAcKey(e){var drop=document.getElementById("gAcDrop"),items=drop.querySelectorAll(".ac-item");if(!drop.classList.contains("on"))return;if(e.key==="ArrowDown"){e.preventDefault();gAcIdx=Math.min(gAcIdx+1,items.length-1);hiAc(items,gAcIdx);}else if(e.key==="ArrowUp"){e.preventDefault();gAcIdx=Math.max(gAcIdx-1,0);hiAc(items,gAcIdx);}else if(e.key==="Enter"&&gAcIdx>=0){e.preventDefault();items[gAcIdx].dispatchEvent(new MouseEvent("mousedown"));}else if(e.key==="Escape"){drop.classList.remove("on");gAcIdx=-1;}}

function renderYearPage(){renderStats();renderColChips();renderTable("");}
function renderStats(){
  var d=getYD(CY),html="",t=0;
  d.cols.forEach(function(c,i){var cnt=(d.rows[c.id]||[]).length,bg=COL_COLORS[i%COL_COLORS.length];t+=cnt;html+='<div class="sc"><div class="sc-dot" style="background:'+bg+'"></div><div><div class="sc-lbl">'+c.name+'</div><div class="sc-val" style="color:'+bg+'">'+cnt+'</div></div></div>';});
  html+='<div class="sc" style="border-color:rgba(200,169,110,.28)"><div class="sc-dot" style="background:var(--gold)"></div><div><div class="sc-lbl">الإجمالي</div><div class="sc-val" style="color:var(--gold)">'+t+'</div></div></div>';
  document.getElementById("statsRow").innerHTML=html;
}
function renderColChips(){
  var d=getYD(CY),html="";
  d.cols.forEach(function(c,i){var bg=COL_COLORS[i%COL_COLORS.length];html+='<span class="col-chip" style="background:'+bg+'22;color:'+bg+';border-color:'+bg+'66">'+c.name+'</span>';});
  document.getElementById("colChips").innerHTML=html;
}
function renderTable(q){
  var d=getYD(CY),cols=d.cols,rows=getMax(CY);
  var headHtml='<th class="th-num" style="width:40px">#</th>';
  cols.forEach(function(c,i){var bg=COL_COLORS[i%COL_COLORS.length];headHtml+='<th style="background:'+bg+'33;color:'+bg+'">'+c.name+'</th>';});
  headHtml+='<th style="width:44px"></th>';
  document.getElementById("tHead").innerHTML=headHtml;
  var tbody=document.getElementById("tBody");
  if(rows===0){tbody.innerHTML='<tr><td colspan="'+(cols.length+2)+'" class="tbl-empty"><div class="ico">📋</div><div>لا يوجد زبائن</div></td></tr>';return;}
  var html="";
  for(var i=0;i<rows;i++){
    var vals=cols.map(function(c){return(d.rows[c.id]||[])[i]||"";});
    var match=!q||vals.some(function(v){return smartMatch(v,q);});
    html+='<tr class="'+(q?(match?"":"dim"):"")+'""><td class="tn">'+(i+1)+'</td>';
    cols.forEach(function(c,ci){
      var nm=(d.rows[c.id]||[])[i]||"";
      var bg=COL_COLORS[ci%COL_COLORS.length];
      var disp=nm?(q&&smartMatch(nm,q)?highlightWords(nm,q):nm):"";
      html+='<td style="background:'+bg+'11">';
      if(nm){html+='<div class="ci" onclick="startEdit(this,\''+c.id+'\','+i+')">'+disp+'<span class="edi">✏️</span></div><button class="copy-btn" onclick="copyName(\''+esc(nm)+'\')" title="نسخ">📋</button>';}
      else{html+='<div class="ci emp" onclick="startEdit(this,\''+c.id+'\','+i+')">—</div>';}
      html+='</td>';
    });
    html+='<td><button class="del-r" onclick="delRow('+i+')">✕</button></td></tr>';
  }
  tbody.innerHTML=html;
}

function yrSearch(){
  var q=document.getElementById("yrSrch").value.trim();
  var clr=document.getElementById("yrSrchClear");
  if(clr) clr.style.display=q?"inline":"none";
  yrAcIdx=-1;renderTable(q);renderYrAC(q);
  var countEl=document.getElementById("yrSrchCount");
  if(!q){countEl.innerHTML="";return;}
  var matches=getAllNames(CY).filter(function(m){return smartMatch(m.name,q);});
  countEl.innerHTML=matches.length
    ? '<span style="background:rgba(200,169,110,.15);color:var(--gold);border:1px solid rgba(200,169,110,.3);padding:3px 10px;border-radius:20px;font-weight:700;font-size:.82rem">👥 '+matches.length+' زبون</span>'
    : '<span style="color:var(--red);font-size:.82rem">لا نتائج</span>';
}
function renderYrAC(q){
  var drop=document.getElementById("yrAcDrop");
  if(!q){drop.classList.remove("on");drop.innerHTML="";return;}
  var matches=getAllNames(CY).filter(function(m){return smartMatch(m.name,q);});
  if(!matches.length){drop.classList.remove("on");drop.innerHTML="";return;}
  drop.innerHTML=matches.slice(0,6).map(function(m){
    var bg=colColor(CY,m.col);
    return '<div class="ac-item" onmousedown="yrAcPick(\''+esc(m.name)+'\')">'+
      '<div class="ac-item-name">'+highlightWords(m.name,q)+'</div>'+
      '<div class="ac-item-meta"><span class="ac-badge" style="background:'+bg+'33;color:'+bg+';border-color:'+bg+'66">'+m.colName+'</span><span class="ac-badge b-row">صف '+(m.idx+1)+'</span></div></div>';
  }).join("");
  drop.classList.add("on");
}
function yrAcPick(name){document.getElementById("yrSrch").value=name;document.getElementById("yrAcDrop").classList.remove("on");renderTable(name);}
function yrAcKey(e){var drop=document.getElementById("yrAcDrop"),items=drop.querySelectorAll(".ac-item");if(!drop.classList.contains("on"))return;if(e.key==="ArrowDown"){e.preventDefault();yrAcIdx=Math.min(yrAcIdx+1,items.length-1);hiAc(items,yrAcIdx);}else if(e.key==="ArrowUp"){e.preventDefault();yrAcIdx=Math.max(yrAcIdx-1,0);hiAc(items,yrAcIdx);}else if(e.key==="Enter"&&yrAcIdx>=0){e.preventDefault();items[yrAcIdx].dispatchEvent(new MouseEvent("mousedown"));}else if(e.key==="Escape"){drop.classList.remove("on");yrAcIdx=-1;}}
function hiAc(items,idx){items.forEach(function(it,i){it.classList.toggle("hi",i===idx);});}

function openColMgr(){renderColList();document.getElementById("colOv").style.display="flex";document.getElementById("newColName").value="";}
function closeColMgr(){document.getElementById("colOv").style.display="none";}
function renderColList(){
  var cols=getCols(CY);
  var html=cols.map(function(c,i){
    var bg=COL_COLORS[i%COL_COLORS.length];
    return '<div class="col-list-item">'+
      '<div style="width:12px;height:12px;border-radius:50%;background:'+bg+';flex-shrink:0"></div>'+
      '<input type="text" value="'+c.name.replace(/"/g,'&quot;')+'" onblur="renameCol(\''+c.id+'\',this.value)" onkeydown="if(event.key===\'Enter\')this.blur()">'+
      '<button class="del-col-btn" onclick="delCol(\''+c.id+'\')">🗑</button>'+
    '</div>';
  }).join("");
  document.getElementById("colList").innerHTML=html||'<div style="color:var(--mut);font-size:.85rem;text-align:center;padding:.5rem">لا توجد أعمدة</div>';
}
function addCol(){
  var name=document.getElementById("newColName").value.trim();
  if(!name){toast("أدخل اسم العمود","er");return;}
  var d=getYD(CY),id="col_"+Date.now();
  d.cols.push({id:id,name:name});d.rows[id]=[];
  saveDB();renderColList();renderYearPage();
  document.getElementById("newColName").value="";
  toast("تمت إضافة عمود: "+name,"ok");
}
function renameCol(colId,name){
  name=name.trim();if(!name)return;
  var d=getYD(CY),col=d.cols.find(function(c){return c.id===colId;});
  if(col&&col.name!==name){col.name=name;saveDB();renderColChips();renderTable(document.getElementById("yrSrch").value.trim());renderStats();toast("تم تعديل اسم العمود","ok");}
}
function delCol(colId){
  var d=getYD(CY);
  if(d.cols.length<=1){toast("لازم يبقى عمود واحد على الأقل","er");return;}
  var col=d.cols.find(function(c){return c.id===colId;});
  if(!confirm('حذف عمود "'+col.name+'" وجميع بياناته؟'))return;
  d.cols=d.cols.filter(function(c){return c.id!==colId;});
  delete d.rows[colId];
  saveDB();renderColList();renderYearPage();
  toast("تم حذف العمود","er");
}

function startEdit(el,col,idx){
  if(editInfo)cancelEdit();
  var td=el.parentElement,d=getYD(CY),cur=(d.rows[col]||[])[idx]||"";
  editInfo={td:td,col:col,idx:idx,prev:cur};
  td.innerHTML='<input class="ci-inp" id="eInp" type="text" value="'+cur.replace(/"/g,'&quot;')+'" dir="rtl" autocomplete="off">';
  var inp=document.getElementById("eInp");
  inp.addEventListener("keydown",function(e){if(e.key==="Enter"){e.preventDefault();commitEdit();}if(e.key==="Escape")cancelEdit();});
  inp.addEventListener("blur",function(){commitEdit();});
  inp.focus();inp.select();
}
function commitEdit(){
  if(!editInfo)return;
  var inp=document.getElementById("eInp");
  if(!inp){editInfo=null;return;}
  var val=inp.value.trim(),d=getYD(CY);
  if(!d.rows[editInfo.col])d.rows[editInfo.col]=[];
  while(d.rows[editInfo.col].length<=editInfo.idx)d.rows[editInfo.col].push("");
  d.rows[editInfo.col][editInfo.idx]=val;
  while(d.rows[editInfo.col].length&&!d.rows[editInfo.col][d.rows[editInfo.col].length-1])d.rows[editInfo.col].pop();
  saveDB();editInfo=null;
  renderTable(document.getElementById("yrSrch").value.trim());renderStats();toast("تم الحفظ ✓","ok");
}
function cancelEdit(){
  if(!editInfo)return;
  var info=editInfo;editInfo=null;
  if(info.prev){info.td.innerHTML='<div class="ci" onclick="startEdit(this,\''+info.col+'\','+info.idx+')">'+info.prev+'<span class="edi">✏️</span></div>';}
  else{info.td.innerHTML='<div class="ci emp" onclick="startEdit(this,\''+info.col+'\','+info.idx+')">—</div>';}
}
function delRow(idx){
  var d=getYD(CY);
  d.cols.forEach(function(c){if((d.rows[c.id]||[]).length>idx)d.rows[c.id].splice(idx,1);});
  saveDB();renderTable(document.getElementById("yrSrch").value.trim());renderStats();toast("تم حذف الصف","er");
}

var modalReady=false;
function openAdd(){
  selC=null;addedCount=0;
  document.getElementById("custInp").value="";
  document.getElementById("addLog").className="added-log";
  var cols=getCols(CY);
  document.getElementById("colPicker").innerHTML=cols.map(function(c,i){
    var bg=COL_COLORS[i%COL_COLORS.length];
    return '<div class="co" data-c="'+c.id+'" onclick="pickC(this)" style="border-color:'+bg+'44">'+c.name+'</div>';
  }).join("");
  document.getElementById("addOv").style.display="flex";
  if(!modalReady){modalReady=true;document.getElementById("addOv").addEventListener("focusin",function(){if(selC)requestAnimationFrame(refreshCol);});}
  setTimeout(function(){document.getElementById("custInp").focus();},50);
}
function closeAdd(){document.getElementById("addOv").style.display="none";}
function refreshCol(){
  var cols=getCols(CY);
  document.querySelectorAll(".co").forEach(function(o){
    var c=o.getAttribute("data-c"),i=cols.findIndex(function(x){return x.id===c;}),bg=COL_COLORS[i%COL_COLORS.length]||"#888";
    o.className="co";
    if(selC&&c===selC){o.classList.add("sel");o.style.cssText="border-color:"+bg+"!important;background:"+bg+"22!important;color:"+bg+"!important";}
    else{o.style.cssText="border-color:"+bg+"44";}
  });
}
function pickC(el){selC=el.getAttribute("data-c");refreshCol();requestAnimationFrame(refreshCol);}
function doAdd(){
  var inp=document.getElementById("custInp"),name=inp.value.trim();
  if(!name){toast("أدخل اسم الزبون","er");inp.focus();return;}
  if(!selC){toast("اختر العمود","er");return;}
  var d=getYD(CY);
  if(!d.rows[selC])d.rows[selC]=[];
  d.rows[selC].push(name);
  saveDB();addedCount++;
  var log=document.getElementById("addLog");
  log.className="added-log on";
  log.textContent=addedCount===1?"✅ تمت إضافة: "+name:"✅ تمت إضافة "+addedCount+" زبائن";
  inp.value="";inp.focus();requestAnimationFrame(refreshCol);
  renderTable(document.getElementById("yrSrch").value.trim());renderStats();
}

function smartMatch(name,q){if(!q)return true;var w=q.trim().toLowerCase().split(/\s+/).filter(function(x){return x.length>0;});var n=name.toLowerCase();return w.every(function(x){return n.indexOf(x)!==-1;});}
function highlightWords(name,q){if(!q)return name;var words=q.trim().split(/\s+/).filter(function(w){return w.length>0;});var r=name;words.forEach(function(w){r=r.replace(new RegExp("("+w.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi"),"<mark>$1</mark>");});return r;}
function esc(s){return s.replace(/\\/g,"\\\\").replace(/'/g,"\\x27");}

function copyName(name){
  navigator.clipboard.writeText(name).then(function(){
    toast("تم نسخ: "+name,"ok");
  }).catch(function(){
    // fallback
    var ta=document.createElement("textarea");
    ta.value=name;ta.style.position="fixed";ta.style.opacity="0";
    document.body.appendChild(ta);ta.select();
    document.execCommand("copy");document.body.removeChild(ta);
    toast("تم نسخ: "+name,"ok");
  });
}

var toastTimer;
function toast(msg,type){var el=document.getElementById("toastEl");el.textContent=(type==="ok"?"✅ ":"❌ ")+msg;el.className="toast on "+(type||"ok");clearTimeout(toastTimer);toastTimer=setTimeout(function(){el.classList.remove("on");},3000);}
function toggleExpand(){var card=document.getElementById("tblCard"),btn=document.getElementById("expandBtn");var fs=card.classList.toggle("fullscreen");btn.textContent=fs?"✕":"⛶";btn.title=fs?"تصغير":"تكبير";document.body.style.overflow=fs?"hidden":"";}

document.addEventListener("click",function(e){if(!e.target.closest(".srch-box-wrap")){document.getElementById("gAcDrop").classList.remove("on");gAcIdx=-1;}if(!e.target.closest(".yr-sbox")){document.getElementById("yrAcDrop").classList.remove("on");yrAcIdx=-1;}});
document.addEventListener("keydown",function(e){if(e.key==="Escape"){if(document.getElementById("addOv").style.display==="flex")closeAdd();if(document.getElementById("colOv").style.display==="flex")closeColMgr();if(document.getElementById("ocrOv").style.display==="flex")closeOcr();if(editInfo)cancelEdit();}});

function importExcel(input){
  var file=input.files[0];if(!file)return;
  var yr=file.name.replace(/\.[^.]+$/,"").replace(/[^0-9]/g,"");
  if(!yr||yr<1900||yr>2100){toast("تأكد إن اسم الملف هو السنة مثل: 2025.xlsx","er");input.value="";return;}
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=new Uint8Array(e.target.result);
      var wb=XLSX.read(data,{type:"array"});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
      var d=getYD(yr),added=0;
      for(var i=1;i<rows.length;i++){
        var row=rows[i];
        d.cols.forEach(function(c,ci){
          var val=(row[ci]||"").toString().trim();
          if(val){if(!d.rows[c.id])d.rows[c.id]=[];d.rows[c.id].push(val);added++;}
        });
      }
      saveDB();renderHome();
      toast("تم استيراد "+added+" إدخال لسنة "+yr+" ✓","ok");
    }catch(err){toast("فشل القراءة — تأكد إن الملف xlsx صحيح","er");}
    input.value="";
  };
  reader.readAsArrayBuffer(file);
}

/* ═══ OCR INVOICE IMPORT ═══ */
var ocrSelCol = null;
var ocrNames = [];

function importInvoices(input) {
  var files = Array.from(input.files);
  if (!files.length) return;

  // Build year select
  var years = Object.keys(db).sort(function(a,b){return b-a;});
  var yrSel = document.getElementById("ocrYrSel");
  yrSel.innerHTML = years.map(function(y){ return '<option value="'+y+'">'+y+'</option>'; }).join("");
  if (!years.length) { toast("أضف سنة أولاً","er"); return; }

  // Build col picker for first year
  ocrSelCol = null;
  var yr = yrSel.value;
  var cols = yr ? getCols(yr) : DEFAULT_COLS;
  document.getElementById("ocrColPicker").innerHTML = cols.map(function(c,i){
    var bg = COL_COLORS[i%COL_COLORS.length];
    return '<div class="co" data-c="'+c.id+'" onclick="pickOcrCol(this)" style="border-color:'+bg+'44">'+c.name+'</div>';
  }).join("");

  yrSel.onchange = function() {
    var c2 = getCols(yrSel.value);
    ocrSelCol = null;
    document.getElementById("ocrColPicker").innerHTML = c2.map(function(c,i){
      var bg = COL_COLORS[i%COL_COLORS.length];
      return '<div class="co" data-c="'+c.id+'" onclick="pickOcrCol(this)" style="border-color:'+bg+'44">'+c.name+'</div>';
    }).join("");
  };

  ocrNames = [];
  document.getElementById("ocrResults").innerHTML = "";
  document.getElementById("ocrFooter").style.display = "none";
  document.getElementById("ocrStatus").textContent = "جاري قراءة الفواتير...";
  document.getElementById("ocrProgress").style.display = "block";
  document.getElementById("ocrBar").style.width = "0%";
  document.getElementById("ocrOv").style.display = "flex";
  input.value = "";

  var done = 0;
  var total = files.length;

  // Process files one by one
  function processNext(idx) {
    if (idx >= files.length) {
      document.getElementById("ocrStatus").textContent = "تمت القراءة — راجع الأسماء واضغط إضافة";
      document.getElementById("ocrProgress").style.display = "none";
      document.getElementById("ocrFooter").style.display = "flex";
      renderOcrResults();
      return;
    }
    var file = files[idx];
    document.getElementById("ocrProgressText").textContent = (idx+1) + " / " + total + " — " + file.name;
    document.getElementById("ocrBar").style.width = Math.round((idx/total)*100) + "%";

    Tesseract.recognize(file, 'ara', {}).then(function(result) {
      var text = result.data.text;
      var name = extractName(text);
      if (name) {
        ocrNames.push({ name: name, file: file.name, checked: true });
      } else {
        ocrNames.push({ name: "", file: file.name, checked: false, failed: true });
      }
      done++;
      document.getElementById("ocrBar").style.width = Math.round((done/total)*100) + "%";
      processNext(idx + 1);
    }).catch(function() {
      ocrNames.push({ name: "", file: file.name, checked: false, failed: true });
      done++;
      processNext(idx + 1);
    });
  }

  processNext(0);
}

function extractName(text) {
  // Look for "اسم العميل" pattern and grab the text after/before it
  var lines = text.split('\n').map(function(l){ return l.trim(); }).filter(function(l){ return l.length > 0; });
  for (var i = 0; i < lines.length; i++) {
    if (lines[i].indexOf('اسم العميل') !== -1 || lines[i].indexOf('اسم الغميل') !== -1 || lines[i].indexOf('العميل') !== -1) {
      // Name might be on same line after the label, or next line
      var sameLine = lines[i].replace(/اسم\s*ال[عغ]ميل/g,'').trim();
      if (sameLine.length > 2) return sameLine;
      if (i+1 < lines.length && lines[i+1].length > 2) return lines[i+1];
    }
  }
  return null;
}

function renderOcrResults() {
  var html = ocrNames.map(function(item, i) {
    if (item.failed && !item.name) {
      return '<div style="padding:.5rem;background:rgba(248,113,113,.1);border-radius:8px;margin-bottom:.4rem;font-size:.8rem;color:var(--red)">❌ فشل: '+item.file+'</div>';
    }
    return '<div style="display:flex;align-items:center;gap:.5rem;padding:.5rem .7rem;background:var(--surf2);border-radius:9px;margin-bottom:.4rem">'+
      '<input type="checkbox" id="ocr_'+i+'" '+(item.checked?'checked':'')+' onchange="ocrNames['+i+'].checked=this.checked" style="width:16px;height:16px;cursor:pointer">'+
      '<input type="text" value="'+item.name.replace(/"/g,'&quot;')+'" onchange="ocrNames['+i+'].name=this.value" style="flex:1;background:none;border:none;outline:none;color:var(--txt);font-family:\'Cairo\',sans-serif;font-size:.88rem;direction:rtl">'+
      '<span style="font-size:.7rem;color:var(--mut)">'+item.file+'</span>'+
    '</div>';
  }).join("");
  document.getElementById("ocrResults").innerHTML = html || '<div style="text-align:center;color:var(--mut);padding:1rem">لم يتم التعرف على أسماء</div>';
}

function pickOcrCol(el) {
  ocrSelCol = el.getAttribute("data-c");
  document.querySelectorAll("#ocrColPicker .co").forEach(function(o){ o.className="co"; o.removeAttribute("style"); });
  var yr = document.getElementById("ocrYrSel").value;
  var cols = getCols(yr);
  var i = cols.findIndex(function(c){ return c.id === ocrSelCol; });
  var bg = COL_COLORS[i%COL_COLORS.length];
  el.classList.add("sel");
  el.style.cssText = "border-color:"+bg+"!important;background:"+bg+"22!important;color:"+bg+"!important";
}

function confirmOcrAdd() {
  if (!ocrSelCol) { toast("اختر العمود","er"); return; }
  var yr = document.getElementById("ocrYrSel").value;
  if (!yr) { toast("اختر السنة","er"); return; }
  var d = getYD(yr);
  if (!d.rows[ocrSelCol]) d.rows[ocrSelCol] = [];
  var added = 0;
  ocrNames.forEach(function(item) {
    if (item.checked && item.name && item.name.trim()) {
      d.rows[ocrSelCol].push(item.name.trim());
      added++;
    }
  });
  saveDB();
  closeOcr();
  renderHome();
  toast("تمت إضافة "+added+" اسم ✓","ok");
}

function closeOcr() {
  document.getElementById("ocrOv").style.display = "none";
  ocrNames = [];
  ocrSelCol = null;
}

loadDB();

</script>
